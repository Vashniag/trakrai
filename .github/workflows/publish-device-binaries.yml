name: Publish Device Packages

on:
  push:
    branches:
      - main
    paths:
      - device/cmd/**
      - device/internal/**
      - device/python/**
      - device/configs/**
      - device/scripts/**
      - device/Dockerfile
      - device/Dockerfile.gstreamer
      - device/go.mod
      - device/go.sum
      - web/apps/trakrai-device/**
      - web/packages/**
      - web/package.json
      - web/pnpm-lock.yaml
      - web/pnpm-workspace.yaml
      - web/turbo.json
      - web/Dockerfile.trakrai-device-bundle
      - .github/workflows/publish-device-binaries.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-device-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    environment:
      name: Production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: device/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker build cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-device-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-device-${{ github.ref_name }}-
            ${{ runner.os }}-buildx-device-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Release device packages
        env:
          TRAKRAI_CLOUD_API_BASE_URL: ${{ secrets.TRAKRAI_CLOUD_API_BASE_URL }}
          TRAKRAI_PACKAGE_RELEASE_TOKEN: ${{ secrets.TRAKRAI_PACKAGE_RELEASE_TOKEN }}
          TRAKRAI_DOCKER_CACHE_FROM: type=local,src=/tmp/.buildx-cache
          TRAKRAI_DOCKER_CACHE_TO: type=local,dest=/tmp/.buildx-cache-new,mode=max
        run: |
          test -n "${TRAKRAI_CLOUD_API_BASE_URL}" || { echo "Missing TRAKRAI_CLOUD_API_BASE_URL for the Production environment"; exit 1; }
          test -n "${TRAKRAI_PACKAGE_RELEASE_TOKEN}" || { echo "Missing TRAKRAI_PACKAGE_RELEASE_TOKEN for the Production environment"; exit 1; }
          mkdir -p .github/state
          mkdir -p /tmp/.buildx-cache
          python3 device/scripts/manage_device_packages.py release \
            --metadata device/package-versions.json \
            --platform linux/arm64 \
            --publish-target cloud-api \
            --cloud-api-base-url "${TRAKRAI_CLOUD_API_BASE_URL}" \
            --cloud-api-token "${TRAKRAI_PACKAGE_RELEASE_TOKEN}" \
            --manifest-out .github/state/device-package-release.json

      - name: Finalize Docker build cache
        if: always()
        run: |
          if [ -d /tmp/.buildx-cache-new ]; then
            rm -rf /tmp/.buildx-cache
            mv /tmp/.buildx-cache-new /tmp/.buildx-cache
          fi

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: device-package-release
          path: .github/state/device-package-release.json
          if-no-files-found: error

      - name: Commit updated package metadata
        run: |
          if git diff --quiet -- device/package-versions.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add device/package-versions.json
          git commit -m "chore(device): update package versions [skip ci]"
          git push
