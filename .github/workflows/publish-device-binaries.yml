name: Publish Device Packages

on:
  push:
    branches:
      - main
    paths:
      - device/cmd/**
      - device/internal/**
      - device/python/**
      - device/configs/**
      - device/scripts/**
      - device/Dockerfile
      - device/Dockerfile.gstreamer
      - device/go.mod
      - device/go.sum
      - web/apps/trakrai-device/**
      - web/packages/**
      - web/package.json
      - web/pnpm-lock.yaml
      - web/pnpm-workspace.yaml
      - web/turbo.json
      - web/Dockerfile.trakrai-device-bundle
      - .github/workflows/publish-device-binaries.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-device-packages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: device/go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        run: corepack enable

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python release dependencies
        run: python3 -m pip install --upgrade pip boto3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Release device packages
        env:
          TRAKRAI_PACKAGE_S3_BUCKET: ${{ secrets.TRAKRAI_PACKAGE_S3_BUCKET }}
        run: |
          mkdir -p .github/state
          python3 device/scripts/manage_device_packages.py release \
            --metadata device/package-versions.json \
            --platform linux/arm64 \
            --publish-target s3 \
            --s3-bucket "${TRAKRAI_PACKAGE_S3_BUCKET}" \
            --s3-region "${{ secrets.AWS_REGION }}" \
            --manifest-out .github/state/device-package-release.json

      - name: Upload release manifest
        uses: actions/upload-artifact@v4
        with:
          name: device-package-release
          path: .github/state/device-package-release.json
          if-no-files-found: error

      - name: Commit updated package metadata
        run: |
          if git diff --quiet -- device/package-versions.json; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add device/package-versions.json
          git commit -m "chore(device): update package versions [skip ci]"
          git push
