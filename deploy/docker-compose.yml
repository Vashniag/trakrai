services:
  gateway-proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    profiles: ['tls']
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      LIVE_GATEWAY_UPSTREAM: ${LIVE_GATEWAY_UPSTREAM:-live-gateway:4000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      live-gateway:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - '5439:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trakrai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trakrai-local-dev}
      POSTGRES_DB: ${POSTGRES_DB:-trakrai}
    volumes:
      - trakrai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-trakrai}']
      interval: 5s
      timeout: 5s
      retries: 5

  openfga-migrate:
    image: openfga/openfga:latest
    restart: 'no'
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-trakrai}:${POSTGRES_PASSWORD:-trakrai-local-dev}@postgres:5432/${POSTGRES_DB:-trakrai}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  openfga:
    image: openfga/openfga:latest
    restart: unless-stopped
    command: run
    ports:
      - '8080:8080'
      - '8081:8081'
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER:-trakrai}:${POSTGRES_PASSWORD:-trakrai-local-dev}@postgres:5432/${POSTGRES_DB:-trakrai}?sslmode=disable
      OPENFGA_LOG_FORMAT: json
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully

  inngest-postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - '5440:5432'
    environment:
      POSTGRES_DB: ${INNGEST_POSTGRES_DB:-inngest}
      POSTGRES_USER: ${INNGEST_POSTGRES_USER:-inngest}
      POSTGRES_PASSWORD: ${INNGEST_POSTGRES_PASSWORD:-password}
    volumes:
      - trakrai_inngest_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${INNGEST_POSTGRES_USER:-inngest} -d ${INNGEST_POSTGRES_DB:-inngest}',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  inngest-redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - trakrai_inngest_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  inngest:
    image: inngest/inngest:v1.17.4
    restart: unless-stopped
    command: 'inngest start'
    ports:
      - '8288:8288'
      - '8289:8289'
    environment:
      INNGEST_REDIS_URI: redis://inngest-redis:6379
      INNGEST_POSTGRES_URI: postgres://${INNGEST_POSTGRES_USER:-inngest}:${INNGEST_POSTGRES_PASSWORD:-password}@inngest-postgres:5432/${INNGEST_POSTGRES_DB:-inngest}
    depends_on:
      inngest-postgres:
        condition: service_healthy
      inngest-redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8288/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  trakrai-workflow-scheduler:
    build:
      context: ../web
      dockerfile: apps/trakrai-workflow-scheduler/Dockerfile
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      NODE_ENV: production
      REDIS_HOST: inngest-redis
      REDIS_PORT: '6379'
      SCHEDULER_HOST: 0.0.0.0
      SCHEDULER_PORT: '3010'
      WEB_APP_BASE_URL: ${TRAKRAI_WORKFLOW_BASE_URL:-http://host.docker.internal:3000}
      LOG_LEVEL: ${TRAKRAI_WORKFLOW_SCHEDULER_LOG_LEVEL:-info}
    depends_on:
      inngest-redis:
        condition: service_healthy

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ['CMD', 'mosquitto_sub', '-t', '$$SYS/#', '-C', '1', '-i', 'healthcheck', '-W', '3']
      interval: 10s
      timeout: 5s
      retries: 3

  live-gateway:
    build:
      context: ../web/apps/live-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      LIVE_GATEWAY_AUTH_SECRET: ${LIVE_GATEWAY_AUTH_SECRET:-trakrai-local-gateway-secret}
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      PORT: '4000'
      CORS_ORIGIN: '*'
      TURN_SERVER_URL: ${TURN_SERVER_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-trakrai}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-trakrai-secret}
      DEVICE_ID: ${DEVICE_ID:-default}
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    environment:
      TURN_PUBLIC_IP: ${TURN_PUBLIC_IP:-}
      TURN_PRIVATE_IP: ${TURN_PRIVATE_IP:-}
    volumes:
      - ./coturn/turnserver.conf:/etc/trakrai-turnserver.conf:ro
      - ./coturn/entrypoint.sh:/usr/local/bin/trakrai-coturn-entrypoint.sh:ro
    command: ['/bin/sh', '/usr/local/bin/trakrai-coturn-entrypoint.sh']

volumes:
  caddy_data:
  caddy_config:
  trakrai_postgres_data:
  trakrai_inngest_postgres_data:
  trakrai_inngest_redis_data:
  mosquitto_data:
  mosquitto_log:
