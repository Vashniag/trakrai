services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - '5439:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trakrai
    volumes:
      - trakrai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ['CMD', 'mosquitto_sub', '-t', '$$SYS/#', '-C', '1', '-i', 'healthcheck', '-W', '3']
      interval: 10s
      timeout: 5s
      retries: 3

  live-gateway:
    build:
      context: ../web/services/live-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      PORT: '4000'
      CORS_ORIGIN: '*'
      TURN_SERVER_URL: ${TURN_SERVER_URL:-}
      TURN_USERNAME: trakrai
      TURN_CREDENTIAL: trakrai-secret
      DEVICE_ID: ${DEVICE_ID:-default}
    depends_on:
      mosquitto:
        condition: service_healthy

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    ports:
      - '3478:3478'
      - '3478:3478/udp'
      - '5349:5349'
      - '49160-49170:49160-49170/udp'
    environment:
      TURN_PUBLIC_IP: ${TURN_PUBLIC_IP:-}
      TURN_PRIVATE_IP: ${TURN_PRIVATE_IP:-}
    volumes:
      - ./coturn/turnserver.conf:/etc/trakrai-turnserver.conf:ro
      - ./coturn/entrypoint.sh:/usr/local/bin/trakrai-coturn-entrypoint.sh:ro
    command: ['/bin/sh', '/usr/local/bin/trakrai-coturn-entrypoint.sh']

volumes:
  trakrai_postgres_data:
  mosquitto_data:
  mosquitto_log:
