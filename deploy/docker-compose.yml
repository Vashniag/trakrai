services:
  gateway-proxy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      LIVE_GATEWAY_UPSTREAM: ${LIVE_GATEWAY_UPSTREAM:-live-gateway:4000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      live-gateway:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    ports:
      - '5439:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trakrai
    volumes:
      - trakrai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ['CMD', 'mosquitto_sub', '-t', '$$SYS/#', '-C', '1', '-i', 'healthcheck', '-W', '3']
      interval: 10s
      timeout: 5s
      retries: 3

  live-gateway:
    build:
      context: ../web/services/live-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - '4000'
    environment:
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      PORT: '4000'
      CORS_ORIGIN: '*'
      TURN_SERVER_URL: ${TURN_SERVER_URL:-}
      TURN_USERNAME: trakrai
      TURN_CREDENTIAL: trakrai-secret
      DEVICE_ID: ${DEVICE_ID:-default}
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    environment:
      TURN_PUBLIC_IP: ${TURN_PUBLIC_IP:-}
      TURN_PRIVATE_IP: ${TURN_PRIVATE_IP:-}
    volumes:
      - ./coturn/turnserver.conf:/etc/trakrai-turnserver.conf:ro
      - ./coturn/entrypoint.sh:/usr/local/bin/trakrai-coturn-entrypoint.sh:ro
    command: ['/bin/sh', '/usr/local/bin/trakrai-coturn-entrypoint.sh']

volumes:
  caddy_data:
  caddy_config:
  trakrai_postgres_data:
  mosquitto_data:
  mosquitto_log:
