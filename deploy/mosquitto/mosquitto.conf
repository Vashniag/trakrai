persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Plain MQTT
listener 1883
protocol mqtt
allow_anonymous true

# MQTT over WebSocket (for browser debugging / fallback)
listener 9001
protocol websockets
allow_anonymous true

# 1 MB message size limit (WebRTC SDP payloads can be large)
message_size_limit 1048576
