<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrakrAI - Live Camera Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 1.5rem; }
    .status-bar { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1rem; border: 1px solid #333; border-radius: 0.5rem; width: 100%; max-width: 56rem; margin-bottom: 1.5rem; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.red { background: #ef4444; }
    .dot.yellow { background: #eab308; }
    .dot.green { background: #22c55e; }
    .state-text { font-size: 0.875rem; font-weight: 500; text-transform: capitalize; }
    .meta { font-size: 0.8rem; color: #888; }
    .video-box { position: relative; width: 100%; max-width: 56rem; aspect-ratio: 16/9; background: #000; border-radius: 0.5rem; overflow: hidden; margin-bottom: 1.5rem; }
    .video-box video { width: 100%; height: 100%; object-fit: contain; }
    .video-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.35); font-size: 1rem; }
    .controls { display: flex; gap: 1rem; align-items: center; width: 100%; max-width: 56rem; }
    select { padding: 0.5rem 0.75rem; border-radius: 0.375rem; border: 1px solid #444; background: #1a1a1a; color: #e5e5e5; font-size: 0.875rem; }
    button { padding: 0.5rem 1.5rem; border-radius: 0.375rem; border: none; font-size: 0.875rem; font-weight: 500; cursor: pointer; color: #fff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-start { background: #16a34a; }
    .btn-start:hover:not(:disabled) { background: #15803d; }
    .btn-stop { background: #dc2626; }
    .btn-stop:hover:not(:disabled) { background: #b91c1c; }
    .error-box { margin-top: 1rem; padding: 0.75rem; border: 1px solid #7f1d1d; background: #1c0a0a; border-radius: 0.375rem; color: #fca5a5; font-size: 0.875rem; width: 100%; max-width: 56rem; }
    .log-box { margin-top: 1rem; width: 100%; max-width: 56rem; font-size: 0.75rem; color: #666; max-height: 12rem; overflow-y: auto; border: 1px solid #222; border-radius: 0.375rem; padding: 0.5rem; font-family: monospace; background: #111; }
    .log-box div { padding: 1px 0; }
  </style>
</head>
<body>
  <h1>TrakrAI - Live Camera Feed</h1>

  <!-- Status Bar -->
  <div class="status-bar">
    <div id="statusDot" class="dot red"></div>
    <span id="statusText" class="state-text">disconnected</span>
    <span id="statusMeta" class="meta"></span>
  </div>

  <!-- Video -->
  <div class="video-box">
    <video id="video" autoplay playsinline muted></video>
    <div id="placeholder" class="video-placeholder">No stream active</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <select id="cameraSelect">
      <option value="default">default</option>
    </select>
    <button id="startBtn" class="btn-start" disabled>Start Live</button>
    <button id="stopBtn" class="btn-stop" style="display:none">Stop Live</button>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>
  <div id="logBox" class="log-box"></div>

  <script>
    const LIVE_FEEDER_WS = `ws://${location.hostname}:${location.port}/ws`;
    const LIVE_FEEDER_HTTP = `http://${location.hostname}:${location.port}`;

    const $ = (id) => document.getElementById(id);
    const video = $('video');
    const placeholder = $('placeholder');
    const startBtn = $('startBtn');
    const stopBtn = $('stopBtn');
    const cameraSelect = $('cameraSelect');
    const errorBox = $('errorBox');
    const logBox = $('logBox');
    const statusDot = $('statusDot');
    const statusText = $('statusText');
    const statusMeta = $('statusMeta');

    let ws = null;
    let pc = null;
    let iceBuf = [];
    let state = 'disconnected'; // disconnected, connecting, connected, streaming

    function log(msg) {
      const d = document.createElement('div');
      d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logBox.prepend(d);
      if (logBox.children.length > 200) logBox.lastChild.remove();
    }

    function setError(msg) {
      if (msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
      else { errorBox.style.display = 'none'; }
    }

    function setState(s) {
      state = s;
      statusText.textContent = s;
      statusDot.className = 'dot ' + ({disconnected:'red', connecting:'yellow', connected:'green', streaming:'green'}[s] || 'red');
      startBtn.disabled = s !== 'connected';
      startBtn.style.display = s === 'streaming' ? 'none' : '';
      stopBtn.style.display = s === 'streaming' ? '' : 'none';
    }

    // --- WebSocket ---
    function connectWS() {
      setState('connecting');
      log('Connecting to live-feeder...');
      ws = new WebSocket(LIVE_FEEDER_WS);

      ws.onopen = () => {
        log('WebSocket connected');
        setState('connected');
        ws.send(JSON.stringify({ type: 'get-status' }));
      };

      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        handleMessage(msg);
      };

      ws.onclose = () => {
        log('WebSocket disconnected, reconnecting in 3s...');
        setState('disconnected');
        cleanupPC();
        setTimeout(connectWS, 3000);
      };

      ws.onerror = () => {}; // onclose fires after
    }

    function wsSend(type, payload) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type, payload }));
      }
    }

    // --- Message Handler ---
    // The live-feeder forwards the full MQTT envelope as msg.payload:
    //   { msgId, timestamp, type, payload: <actual data> }
    // So the real data is at msg.payload.payload
    function unwrap(envelope) {
      return envelope && envelope.payload !== undefined ? envelope.payload : envelope;
    }

    function handleMessage(msg) {
      switch (msg.type) {
        case 'device-status': {
          const p = unwrap(msg.payload);
          if (state === 'disconnected' || state === 'connecting') setState('connected');
          const uptime = p.uptime ? Math.floor(p.uptime / 60) + 'm' : '?';
          statusMeta.textContent = `Uptime: ${uptime}`;

          // Update camera dropdown
          if (p.cameras && p.cameras.length > 0) {
            cameraSelect.innerHTML = '';
            for (const cam of p.cameras) {
              const opt = document.createElement('option');
              opt.value = cam.name || cam;
              opt.textContent = cam.name || cam;
              cameraSelect.appendChild(opt);
            }
          }
          log(`Heartbeat: uptime=${uptime}`);
          break;
        }

        case 'device-response': {
          const r = unwrap(msg.payload);
          if (r.type === 'start-live-ack' || (msg.payload && msg.payload.type === 'start-live-ack')) {
            const ack = r.type === 'start-live-ack' ? r : unwrap(r);
            if (ack.error) {
              setError(ack.error);
              log('Start-live failed: ' + ack.error);
            } else {
              log('Start-live acknowledged');
            }
          }
          break;
        }

        case 'sdp-offer':
          log('Received SDP offer from device');
          handleOffer(unwrap(msg.payload));
          break;

        case 'ice-candidate':
          handleRemoteICE(unwrap(msg.payload));
          break;
      }
    }

    // --- WebRTC ---
    async function handleOffer(payload) {
      try {
        const iceResp = await fetch(`${LIVE_FEEDER_HTTP}/api/ice-config`);
        const iceConfig = await iceResp.json();
        log('ICE config fetched');

        pc = new RTCPeerConnection(iceConfig);

        pc.ontrack = (e) => {
          log('Received video track');
          video.srcObject = e.streams[0] || new MediaStream([e.track]);
          placeholder.style.display = 'none';
          setState('streaming');
        };

        pc.onicecandidate = (e) => {
          if (e.candidate) {
            wsSend('ice-candidate', { candidate: e.candidate.toJSON() });
          }
        };

        pc.onconnectionstatechange = () => {
          log('PeerConnection state: ' + pc.connectionState);
          if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
            setError('WebRTC connection lost');
            cleanupPC();
            setState('connected');
          }
        };

        pc.oniceconnectionstatechange = () => {
          log('ICE state: ' + pc.iceConnectionState);
        };

        await pc.setRemoteDescription(new RTCSessionDescription({ type: 'offer', sdp: payload.sdp }));
        log('Remote description set');

        // Flush buffered ICE candidates
        for (const c of iceBuf) {
          await pc.addIceCandidate(new RTCIceCandidate(c));
        }
        iceBuf = [];

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        wsSend('sdp-answer', { sdp: answer.sdp });
        log('SDP answer sent');
      } catch (err) {
        log('WebRTC error: ' + err.message);
        setError(err.message);
        cleanupPC();
      }
    }

    async function handleRemoteICE(payload) {
      if (pc && pc.remoteDescription) {
        await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
      } else {
        iceBuf.push(payload.candidate);
      }
    }

    function cleanupPC() {
      if (pc) { pc.close(); pc = null; }
      video.srcObject = null;
      placeholder.style.display = '';
      iceBuf = [];
    }

    // --- Buttons ---
    startBtn.onclick = () => {
      setError(null);
      const cam = cameraSelect.value || 'default';
      log('Requesting start-live for camera: ' + cam);
      wsSend('start-live', { cameraName: cam });
    };

    stopBtn.onclick = () => {
      log('Requesting stop-live');
      wsSend('stop-live', {});
      cleanupPC();
      setState('connected');
    };

    // --- Init ---
    connectWS();
  </script>
</body>
</html>
