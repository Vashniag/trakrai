services:
  minio:
    build:
      context: ./minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - '19000:9000'
      - '19001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - type: volume
        source: trakrai_local_minio
        target: /data
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1']
      interval: 5s
      timeout: 3s
      retries: 20

  cloud-api:
    build:
      context: ./cloud-api
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      TRAKRAI_LOCAL_CLOUD_API_PORT: 3000
      TRAKRAI_MINIO_ENDPOINT: minio:9000
      TRAKRAI_MINIO_ACCESS_KEY: minioadmin
      TRAKRAI_MINIO_SECRET_KEY: minioadmin
      TRAKRAI_MINIO_BUCKET: trakrai-local
      TRAKRAI_MINIO_SECURE: 'false'
      TRAKRAI_DEVICE_ACCESS_TOKEN: ${TRAKRAI_LOCAL_DEVICE_ACCESS_TOKEN:-}
      TRAKRAI_PACKAGE_RELEASE_TOKEN: ${TRAKRAI_LOCAL_PACKAGE_RELEASE_TOKEN:-}
    healthcheck:
      test:
        [
          'CMD',
          'python3',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:3000/health", timeout=2).read()',
        ]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  mock-speaker:
    build:
      context: ./mock-speaker
    restart: unless-stopped
    ports:
      - '18910:8081'
    volumes:
      - '${TRAKRAI_LOCAL_SHARED_DIR}/mock-speaker:/data'
    healthcheck:
      test:
        [
          'CMD',
          'python3',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8081/health", timeout=2).read()',
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  fake-camera:
    build:
      context: ./fake-camera
    restart: unless-stopped
    ports:
      - '${TRAKRAI_LOCAL_RTSP_PORT:-18554}:8554'
    volumes:
      - type: bind
        source: ${TRAKRAI_LOCAL_VIDEO_FILE}
        target: /video/input.mp4
        read_only: true
    environment:
      TRAKRAI_RTSP_PATH: stream
      TRAKRAI_VIDEO_FILE: /video/input.mp4
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'ffprobe -v error -rtsp_transport tcp -show_streams rtsp://127.0.0.1:8554/stream >/dev/null 2>&1',
        ]
      interval: 10s
      timeout: 15s
      retries: 12
      start_period: 15s

  device-emulator:
    build:
      context: ./device-emulator
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      fake-camera:
        condition: service_healthy
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${TRAKRAI_LOCAL_HTTP_PORT:-18080}:8080'
      - '${TRAKRAI_LOCAL_WEBRTC_UDP_PORT_RANGE:-40000-40049}:${TRAKRAI_LOCAL_WEBRTC_UDP_PORT_RANGE:-40000-40049}/udp'
    volumes:
      - type: bind
        source: ${TRAKRAI_LOCAL_STAGE_DIR}
        target: /stage
        read_only: true
      - type: volume
        source: trakrai_local_runtime
        target: /home/hacklab/trakrai-device-runtime
      - type: bind
        source: ${TRAKRAI_LOCAL_SHARED_DIR}
        target: /home/hacklab/trakrai-device-runtime/shared
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8080/api/runtime-config >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  trakrai_local_runtime:
  trakrai_local_minio:
